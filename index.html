<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zen Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Fredoka',sans-serif;background:linear-gradient(160deg,#0f0c29,#1a1a3e 40%,#24243e);color:#fff;height:100vh;width:100vw;overflow:hidden;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}
.header{padding:10px 20px 5px;text-align:center;background:rgba(0,0,0,0.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;position:relative}
.header-center{text-align:center}
.header h1{font-size:20px;font-weight:600;letter-spacing:1px;background:linear-gradient(90deg,#43E97B,#38F9D7,#A18CD1,#FA709A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:2px;margin-top:2px}
.music-controls{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:8px}
.music-btn{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(6px)}
.music-btn:hover{background:rgba(255,255,255,0.15)}
.music-btn.muted{opacity:.4}
.music-drawer{position:fixed;top:0;right:-320px;width:300px;height:100vh;background:rgba(15,12,41,0.97);border-left:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(20px);z-index:1000;transition:right .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding:20px 16px}
.music-drawer.open{right:0}
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:none}
.drawer-overlay.open{display:block}
.drawer-title{font-size:16px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.drawer-close{width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.track-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.track-item{padding:10px 12px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:10px}
.track-item:hover{background:rgba(255,255,255,0.08)}
.track-item.active{background:rgba(161,140,209,0.15);border-color:rgba(161,140,209,0.4)}
.track-icon{font-size:20px;flex-shrink:0}
.track-info{flex:1}.track-name{font-size:12px;font-weight:500}.track-desc{font-size:10px;color:rgba(255,255,255,0.4);margin-top:1px}
.track-playing{width:18px;height:18px;display:flex;align-items:center;gap:2px}
.track-playing span{width:3px;background:#A18CD1;border-radius:2px;animation:eq .8s ease-in-out infinite alternate}
.track-playing span:nth-child(1){height:8px;animation-delay:0s}
.track-playing span:nth-child(2){height:14px;animation-delay:.2s}
.track-playing span:nth-child(3){height:10px;animation-delay:.4s}
@keyframes eq{0%{height:4px}100%{height:16px}}
.now-playing-bar{margin-top:10px;padding:10px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);text-align:center;font-size:11px;color:rgba(255,255,255,0.5)}
.now-playing-bar .np-title{font-size:12px;color:#fff;font-weight:500;margin-bottom:3px}
.vol-row{display:flex;align-items:center;gap:10px;margin-top:8px;padding:0 4px}
.vol-row span{font-size:14px}
.vol-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:rgba(255,255,255,0.15);border-radius:4px;outline:none}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#A18CD1;cursor:pointer}
.tabs{display:flex;gap:4px;padding:6px 8px;justify-content:center;flex-shrink:0;flex-wrap:wrap}
.tab-btn{display:flex;align-items:center;gap:4px;padding:5px 11px;border-radius:50px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.45);font-family:'Fredoka',sans-serif;font-size:12px;font-weight:400;cursor:pointer;transition:all .3s;backdrop-filter:blur(4px)}
.tab-btn.active{border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.12);color:#fff}
.tab-btn .icon{font-size:13px}
.game-area{flex:1;position:relative;overflow:hidden}
.mode-panel{display:none;width:100%;height:100%;position:absolute;top:0;left:0}
.mode-panel.active{display:block}
.score-display{position:absolute;top:14px;right:16px;font-size:22px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.3);pointer-events:none;z-index:10}
.hint-text{position:absolute;top:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:12px;pointer-events:none;z-index:10;text-align:center;white-space:nowrap}
.game-canvas{width:100%;height:100%;display:block;cursor:crosshair}
#breathe-panel{display:none;flex-direction:column;align-items:center;justify-content:center;gap:28px;transition:background 2s ease}
#breathe-panel.active{display:flex}
.breathe-label{font-size:13px;color:rgba(255,255,255,0.4);letter-spacing:3px;text-transform:uppercase}
.breathe-orb{width:170px;height:170px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform 4s ease-in-out,background 1s ease,box-shadow 1s ease;will-change:transform}
.breathe-orb .timer-num{font-size:38px;font-weight:600;color:#fff;line-height:1}
.breathe-phase{font-size:24px;font-weight:500;letter-spacing:1px}
.smash-item{position:absolute;cursor:pointer;transition:transform .2s;animation:sf 3s ease-in-out infinite}
.smash-item.popped{transform:rotate(180deg) scale(1.8)!important;opacity:0!important;filter:blur(3px) brightness(2);transition:transform .4s ease-out,opacity .5s ease-out,filter .3s;pointer-events:none;animation:none}
@keyframes sf{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.bottom-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center;padding:7px 12px;border-radius:40px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);z-index:10;flex-wrap:wrap;justify-content:center}
.bottom-bar button{padding:5px 12px;border-radius:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;font-family:'Fredoka',sans-serif;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
.bottom-bar button:hover{background:rgba(255,255,255,0.2)}
.pc{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0}
.pc.active{border-color:#fff;transform:scale(1.2)}
.psize{width:45px;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.2);border-radius:4px;outline:none;margin:0 4px}
.psize::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer}
.clear-btn{position:absolute;bottom:18px;right:18px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;border-radius:30px;padding:8px 18px;font-family:'Fredoka',sans-serif;font-size:13px;cursor:pointer;backdrop-filter:blur(8px);z-index:10}
.img-selector{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:10;flex-wrap:wrap;justify-content:center;max-width:95%;background:rgba(0,0,0,.4);padding:6px 10px;border-radius:30px;backdrop-filter:blur(8px)}
.img-thumb{width:40px;height:40px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:all .2s;object-fit:cover}
.img-thumb.active{border-color:#43E97B;transform:scale(1.1)}
.color-palette{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:5px;align-items:center;padding:7px 14px;border-radius:40px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(10px);z-index:10}
.puzzle-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20;background:rgba(15,12,41,0.92);overflow-y:auto;padding:20px}
.puzzle-overlay h2{font-size:20px;font-weight:600;background:linear-gradient(90deg,#43E97B,#38F9D7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.scene-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;max-width:360px}
.scene-card{width:70px;height:70px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all .2s;overflow:hidden;position:relative}
.scene-card.active{border-color:#43E97B;transform:scale(1.05)}
.scene-card img{width:100%;height:100%;object-fit:cover}
.scene-card .scene-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:8px;text-align:center;padding:2px}
.diff-btn{padding:10px 28px;border-radius:30px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;font-family:'Fredoka',sans-serif;font-size:14px;cursor:pointer;transition:all .3s;min-width:170px;text-align:center}
.diff-btn:hover{background:rgba(255,255,255,0.15);transform:scale(1.05)}
.diff-btn .sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}
.puzzle-info{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:14px;align-items:center;z-index:10;pointer-events:none;font-size:12px;color:rgba(255,255,255,0.6)}
.puzzle-info span{background:rgba(0,0,0,.4);padding:3px 10px;border-radius:20px}
.puzzle-complete{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:25;background:rgba(15,12,41,0.85)}
.puzzle-complete.show{display:flex}
.puzzle-complete h2{font-size:26px}
.puzzle-complete p{color:rgba(255,255,255,0.5);font-size:13px}
</style>
</head>
<body>
<div class="header">
  <div class="header-center"><h1>zen zone</h1><p>pick your peace</p></div>
  <div class="music-controls">
    <button class="music-btn" id="muteBtn" title="Mute/Unmute">🔊</button>
    <button class="music-btn" id="drawerBtn" title="Music">🎵</button>
  </div>
</div>
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="music-drawer" id="musicDrawer">
  <div class="drawer-title"><span>🎶 Zen Playlist</span><button class="drawer-close" id="drawerClose">✕</button></div>
  <div class="track-list" id="trackList"></div>
  <div class="vol-row"><span>🔈</span><input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="50"><span>🔊</span></div>
  <div class="now-playing-bar" id="nowPlayingBar"><div style="color:rgba(255,255,255,0.35)">tap a track to play</div></div>
</div>
<div class="tabs" id="mainTabs">
  <button class="tab-btn active" data-mode="bubbles"><span class="icon">🫧</span> Pop</button>
  <button class="tab-btn" data-mode="sand"><span class="icon">✨</span> Draw</button>
  <button class="tab-btn" data-mode="paint"><span class="icon">🎨</span> Paint</button>
  <button class="tab-btn" data-mode="color"><span class="icon">🌿</span> Color</button>
  <button class="tab-btn" data-mode="dots"><span class="icon">🔗</span> Dots</button>
  <button class="tab-btn" data-mode="puzzle"><span class="icon">🧩</span> Puzzle</button>
  <button class="tab-btn" data-mode="breathe"><span class="icon">🌬️</span> Breathe</button>
  <button class="tab-btn" data-mode="smash"><span class="icon">💥</span> Smash</button>
</div>
<div class="game-area" id="gameArea">
  <div class="mode-panel active" id="bubble-panel"><canvas class="game-canvas" id="bubbleCanvas"></canvas><div class="score-display" id="bubbleScore">🫧 0</div></div>
  <div class="mode-panel" id="sand-panel"><canvas class="game-canvas" id="sandCanvas" style="touch-action:none"></canvas><div class="hint-text">draw in the sand</div><button class="clear-btn" id="sandClear">✨ Clear</button></div>
  <div class="mode-panel" id="paint-panel"><canvas class="game-canvas" id="paintCanvas" style="touch-action:none"></canvas><div class="hint-text">paint freely</div><div class="bottom-bar" id="paintToolbar"></div></div>
  <div class="mode-panel" id="color-panel"><canvas class="game-canvas" id="colorCanvas" style="touch-action:none;cursor:pointer"></canvas><div class="img-selector" id="colorSelector"></div><div class="color-palette" id="colorPalette"></div></div>
  <div class="mode-panel" id="dots-panel"><canvas class="game-canvas" id="dotsCanvas" style="touch-action:none"></canvas><div class="hint-text" id="dotsHint">connect the dots</div><div class="bottom-bar"><button id="dotsNew">🔄 New Shape</button><button id="dotsClear">✨ Clear</button></div></div>
  <div class="mode-panel" id="puzzle-panel">
    <canvas class="game-canvas" id="puzzleCanvas" style="touch-action:none;cursor:grab"></canvas>
    <div class="puzzle-info" id="puzzleInfo"><span id="puzzleMoves">Moves: 0</span><span id="puzzleTimer">0:00</span></div>
    <div class="puzzle-overlay" id="puzzleOverlay">
      <h2>🧩 Zen Puzzle</h2>
      <p style="color:rgba(255,255,255,0.4);font-size:12px;margin-bottom:4px">choose a scene</p>
      <div class="scene-grid" id="puzzleSceneGrid"></div>
      <p style="color:rgba(255,255,255,0.4);font-size:12px;margin-bottom:4px">choose difficulty</p>
      <button class="diff-btn" data-diff="easy" data-cols="3" data-rows="3">🟢 Easy<div class="sub">3 × 3 · 9 pieces</div></button>
      <button class="diff-btn" data-diff="medium" data-cols="5" data-rows="4">🟡 Medium<div class="sub">5 × 4 · 20 pieces</div></button>
      <button class="diff-btn" data-diff="hard" data-cols="7" data-rows="5">🔴 Advanced<div class="sub">7 × 5 · 35 pieces</div></button>
    </div>
    <div class="puzzle-complete" id="puzzleComplete"><h2>✨ Beautiful!</h2><p id="puzzleStats"></p><button class="diff-btn" id="puzzleAgain">🔄 Play Again</button></div>
    <div class="bottom-bar" id="puzzleBar" style="display:none"><button id="puzzleReset">🔄 New Puzzle</button><button id="puzzlePreview">👁️ Preview</button></div>
  </div>
  <div class="mode-panel" id="breathe-panel">
    <div class="breathe-label" id="breatheCycle">4-7-8 breathing · cycle 1</div>
    <div class="breathe-orb" id="breatheOrb"><span class="timer-num" id="breatheTimer">4</span></div>
    <div class="breathe-phase" id="breathePhase">Breathe In</div>
  </div>
  <div class="mode-panel" id="smash-panel"><div class="hint-text">tap to smash!</div><div class="score-display" id="smashScore">💥 0</div></div>
</div>

let audioCtx=null,masterGain=null,currentNodes=[],isMuted=false,currentTrackId=null,volume=.5;
const TRACKS=[
  {id:'rain',icon:'🌧️',name:'Gentle Rain',desc:'Soft rainfall on leaves',type:'noise',filter:800},
  {id:'ocean',icon:'🌊',name:'Ocean Waves',desc:'Rolling waves on shore',type:'noise',filter:400},
  {id:'drone1',icon:'🕉️',name:'Om Drone',desc:'Deep meditative hum',type:'tone',freq:136.1,wave:'sine'},
  {id:'bells',icon:'🔔',name:'Temple Bells',desc:'Ethereal singing bowls',type:'bells',freq:528},
  {id:'forest',icon:'🌿',name:'Forest Ambience',desc:'Wind through trees',type:'noise',filter:1200},
  {id:'crystal',icon:'💎',name:'Crystal Tones',desc:'Shimmering high harmonics',type:'tone',freq:396,wave:'sine'},
  {id:'white',icon:'☁️',name:'White Noise',desc:'Smooth static calm',type:'noise',filter:6000},
  {id:'binau',icon:'🧠',name:'Binaural Focus',desc:'Theta wave 6Hz beat',type:'binaural',freqL:200,freqR:206},
  {id:'stream',icon:'💧',name:'Mountain Stream',desc:'Babbling brook',type:'noise',filter:1600},
  {id:'wind',icon:'🍃',name:'Bamboo Wind',desc:'Breeze through bamboo',type:'noise',filter:600},
  {id:'tibetan',icon:'🏔️',name:'Tibetan Bowl',desc:'Deep resonant tones',type:'bells',freq:264},
  {id:'earth',icon:'🌍',name:'Earth Hum',desc:'Schumann resonance',type:'binaural',freqL:250,freqR:257.83},
  {id:'aurora',icon:'🌌',name:'Aurora Drift',desc:'Ethereal pad soundscape',type:'tone',freq:174,wave:'sine'},
  {id:'zen',icon:'⛩️',name:'Zen Garden',desc:'Peaceful koto-like tones',type:'bells',freq:440},
  {id:'cosmos',icon:'🪐',name:'Cosmic Drift',desc:'Deep space ambient',type:'tone',freq:108,wave:'sine'},
  {id:'pink',icon:'🩷',name:'Pink Noise',desc:'Balanced frequency calm',type:'noise',filter:3000},
];
function initAudio(){
if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=isMuted?0:volume;masterGain.connect(audioCtx.destination);
try{var b=audioCtx.createBuffer(1,1,22050),s=audioCtx.createBufferSource();s.buffer=b;s.connect(audioCtx.destination);s.start(0)}catch(e){}}
if(audioCtx.state==='suspended'){audioCtx.resume()}
}
function stopTrack(){currentNodes.forEach(n=>{try{n.stop()}catch(e){}try{n.disconnect()}catch(e){}});currentNodes=[];currentTrackId=null}
function playTrack(t){initAudio();function _doPlay(){stopTrack();currentTrackId=t.id;
  if(t.type==='noise'){const len=audioCtx.sampleRate*4,buf=audioCtx.createBuffer(1,len,audioCtx.sampleRate),d=buf.getChannelData(0);let last=0;for(let i=0;i<len;i++){last=(last+.02*(Math.random()*2-1))/1.02;d[i]=last*3.5}const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=t.filter;const g=audioCtx.createGain();g.gain.value=.7;src.connect(f);f.connect(g);g.connect(masterGain);src.start();currentNodes.push(src,f,g)}
  else if(t.type==='tone'){[1,1.5,2,3].forEach((m,i)=>{const o=audioCtx.createOscillator();o.type=t.wave||'sine';o.frequency.value=t.freq*m;const g=audioCtx.createGain();g.gain.value=.15/(i+1);o.connect(g);g.connect(masterGain);o.start();currentNodes.push(o,g)})}
  else if(t.type==='bells'){const ratios=[1,1.5,2,2.5,3];function ring(){if(currentTrackId!==t.id)return;const freq=t.freq*ratios[~~(Math.random()*ratios.length)];const o=audioCtx.createOscillator();o.type='sine';o.frequency.value=freq;const g=audioCtx.createGain();g.gain.setValueAtTime(.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+4);o.connect(g);g.connect(masterGain);o.start();o.stop(audioCtx.currentTime+4);setTimeout(ring,2000+Math.random()*3000)}ring();const ph=audioCtx.createOscillator();ph.frequency.value=0;const pg=audioCtx.createGain();pg.gain.value=0;ph.connect(pg);pg.connect(masterGain);ph.start();currentNodes.push(ph,pg)}
  else if(t.type==='binaural'){const oL=audioCtx.createOscillator(),oR=audioCtx.createOscillator();oL.frequency.value=t.freqL;oR.frequency.value=t.freqR;const mg=audioCtx.createChannelMerger(2),gL=audioCtx.createGain(),gR=audioCtx.createGain();gL.gain.value=.3;gR.gain.value=.3;oL.connect(gL);gL.connect(mg,0,0);oR.connect(gR);gR.connect(mg,0,1);mg.connect(masterGain);oL.start();oR.start();currentNodes.push(oL,oR,gL,gR,mg)}
  updateTrackUI()};if(audioCtx.state==='suspended'){audioCtx.resume().then(_doPlay)}else{_doPlay()}}
function toggleMute(){isMuted=!isMuted;if(masterGain)masterGain.gain.value=isMuted?0:volume;document.getElementById('muteBtn').textContent=isMuted?'🔇':'🔊';document.getElementById('muteBtn').classList.toggle('muted',isMuted)}
function updateTrackUI(){document.querySelectorAll('.track-item').forEach(el=>{const a=el.dataset.trackId===currentTrackId;el.classList.toggle('active',a);const eq=el.querySelector('.track-playing');if(eq)eq.style.display=a?'flex':'none'});const bar=document.getElementById('nowPlayingBar');if(currentTrackId){const t=TRACKS.find(x=>x.id===currentTrackId);bar.innerHTML=`<div class="np-title">${t.icon} ${t.name}</div><div>${t.desc}</div>`}else bar.innerHTML='<div style="color:rgba(255,255,255,0.35)">tap a track to play</div>'}
(function(){const list=document.getElementById('trackList');TRACKS.forEach(t=>{const el=document.createElement('div');el.className='track-item';el.dataset.trackId=t.id;el.innerHTML=`<span class="track-icon">${t.icon}</span><div class="track-info"><div class="track-name">${t.name}</div><div class="track-desc">${t.desc}</div></div><div class="track-playing" style="display:none"><span></span><span></span><span></span></div>`;el.onclick=()=>{if(currentTrackId===t.id){stopTrack();updateTrackUI()}else playTrack(t)};list.appendChild(el)})})();
document.getElementById('drawerBtn').onclick=()=>{document.getElementById('musicDrawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('open')};
document.getElementById('drawerClose').onclick=document.getElementById('drawerOverlay').onclick=()=>{document.getElementById('musicDrawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('open')};
document.getElementById('muteBtn').onclick=toggleMute;
document.getElementById('volSlider').oninput=function(){volume=this.value/100;if(masterGain&&!isMuted)masterGain.gain.value=volume};

const initMap={bubbles:initBubbles,sand:initSand,paint:initPaint,color:initColor,dots:initDots,puzzle:initPuzzle,breathe:initBreathe,smash:initSmash};

const PAL=[['#FF6B6B','#FFA07A','#FFD700','#98FB98','#87CEEB','#DDA0DD'],['#E0C3FC','#8EC5FC','#B8E986','#FFC3A0','#FFAFBD','#A1C4FD'],['#43E97B','#38F9D7','#FA709A','#FEE140','#A18CD1','#FBC2EB']];
let bubs=[],pParts=[],bSc=0,bAnim=null,lSp=0;
function initBubbles(){
  cancelAnimationFrame(bAnim);
  const c=document.getElementById('bubbleCanvas'),x=c.getContext('2d');
  c.width=c.parentElement.clientWidth;c.height=c.parentElement.clientHeight;
  bubs=[];pParts=[];lSp=0;
  function sp(){const p=PAL[~~(Math.random()*PAL.length)],col=p[~~(Math.random()*p.length)],r=20+Math.random()*40;bubs.push({x:r+Math.random()*(c.width-r*2),y:c.height+r,r,color:col,speed:.4+Math.random()*1.2,wobble:Math.random()*Math.PI*2,ws:.01+Math.random()*.03,op:.7+Math.random()*.3})}
  function loop(t){if(currentMode!=='bubbles')return;x.clearRect(0,0,c.width,c.height);if(t-lSp>400){sp();lSp=t}
    bubs=bubs.filter(b=>{b.y-=b.speed;b.wobble+=b.ws;b.x+=Math.sin(b.wobble)*.5;if(b.y+b.r<0)return false;x.save();x.globalAlpha=b.op;const g=x.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,b.r*.1,b.x,b.y,b.r);g.addColorStop(0,'rgba(255,255,255,0.8)');g.addColorStop(.4,b.color);g.addColorStop(1,b.color+'44');x.beginPath();x.arc(b.x,b.y,b.r,0,Math.PI*2);x.fillStyle=g;x.fill();x.strokeStyle=b.color+'88';x.lineWidth=1.5;x.stroke();x.restore();return true});
    pParts=pParts.filter(p=>{p.life-=.03;if(p.life<=0)return false;p.particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=.05;x.save();x.globalAlpha=p.life;x.fillStyle=pt.color;x.beginPath();x.arc(pt.x,pt.y,pt.r*p.life,0,Math.PI*2);x.fill();x.restore()});return true});bAnim=requestAnimationFrame(loop)}
  bAnim=requestAnimationFrame(loop);
  function popAt(mx,my){bubs=bubs.filter(b=>{if(Math.hypot(b.x-mx,b.y-my)<b.r+10){const pts=[];for(let i=0;i<8;i++){const a=Math.PI*2*i/8;pts.push({x:b.x,y:b.y,vx:Math.cos(a)*(2+Math.random()*3),vy:Math.sin(a)*(2+Math.random()*3),r:2+Math.random()*4,color:b.color})}pParts.push({life:1,particles:pts});bSc++;document.getElementById('bubbleScore').textContent='🫧 '+bSc;return false}return true})}
  c.onclick=e=>{const rect=c.getBoundingClientRect();popAt(e.clientX-rect.left,e.clientY-rect.top)};

}

let colorIdx=0,colorPick='#FF6B6B',colorImg=null,colorData=null,colorMask=null;
function initColor(){
  const c=document.getElementById('colorCanvas'),x=c.getContext('2d');
  c.width=c.parentElement.clientWidth;c.height=c.parentElement.clientHeight;
  // Build image selector
  const sel=document.getElementById('colorSelector');sel.innerHTML='';
  IMG_DATA.forEach((im,i)=>{
    const img=document.createElement('img');img.src=im.thumb||im.src;img.className='img-thumb'+(i===colorIdx?' active':'');img.title=im.name;
    img.onclick=()=>{colorIdx=i;sel.querySelectorAll('.img-thumb').forEach(z=>z.classList.remove('active'));img.classList.add('active');loadColorImage()};
    sel.appendChild(img)});
  function loadColorImage(){
    const im=new Image();im.crossOrigin='anonymous';im.onload=()=>{
      colorImg=im;
      // Draw desaturated/outlined version
      const scale=Math.min(c.width/im.width,c.height/im.height)*.85;
      const dw=im.width*scale,dh=im.height*scale;
      const ox=(c.width-dw)/2,oy=(c.height-dh)/2;
      x.fillStyle='#111118';x.fillRect(0,0,c.width,c.height);
      // Draw grayscale outline version
      x.save();x.filter='grayscale(100%) brightness(1.4) contrast(0.3)';
      x.drawImage(im,ox,oy,dw,dh);x.restore();
      // Draw edge overlay
      x.save();x.globalCompositeOperation='multiply';x.filter='grayscale(100%) contrast(3) brightness(0.8)';
      x.globalAlpha=0.15;x.drawImage(im,ox,oy,dw,dh);x.restore();
      // Store image data for flood fill reference
      const tempC=document.createElement('canvas');tempC.width=c.width;tempC.height=c.height;
      const tx=tempC.getContext('2d');tx.drawImage(im,ox,oy,dw,dh);
      colorData=tx.getImageData(0,0,c.width,c.height);
      // Store current canvas as mask
      colorMask=x.getImageData(0,0,c.width,c.height);
      buildColorPalette()};
    im.src=IMG_DATA[colorIdx].src;
  }
  function buildColorPalette(){
    const pal=document.getElementById('colorPalette');pal.innerHTML='';
    const colors=['#FF6B6B','#FFA07A','#FFD700','#43E97B','#38F9D7','#2E8B57','#4682B4','#A18CD1','#FA709A','#8B4513','#FF69B4','#1E90FF','#FF4500','#228B22','#87CEEB','#FFF'];
    colors.forEach(col=>{const d=document.createElement('div');d.className='pc'+(col===colorPick?' active':'');d.style.background=col;d.onclick=()=>{colorPick=col;pal.querySelectorAll('.pc').forEach(z=>z.classList.remove('active'));d.classList.add('active')};pal.appendChild(d)});
    const cl=document.createElement('button');cl.textContent='🗑️';cl.style.cssText='padding:4px 10px;border-radius:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;font-family:Fredoka;font-size:10px;cursor:pointer';
    cl.onclick=loadColorImage;pal.appendChild(cl)
  }
  // Flood fill on click
  c.onclick=e=>{
    if(!colorData)return;
    const rect=c.getBoundingClientRect(),mx=~~(e.clientX-rect.left),my=~~(e.clientY-rect.top);
    floodFill(x,c.width,c.height,mx,my,colorPick)
  };
  loadColorImage()
}
function floodFill(ctx,w,h,sx,sy,fillColor){
  const imgData=ctx.getImageData(0,0,w,h),data=imgData.data;
  const idx=(sy*w+sx)*4;
  const tr=data[idx],tg=data[idx+1],tb=data[idx+2];
  // Parse fill color
  const fc=document.createElement('canvas').getContext('2d');fc.fillStyle=fillColor;fc.fillRect(0,0,1,1);
  const fd=fc.getImageData(0,0,1,1).data;
  const fr=fd[0],fg=fd[1],fb=fd[2];
  if(tr===fr&&tg===fg&&tb===fb)return;
  const tolerance=40;
  function match(i){return Math.abs(data[i]-tr)<=tolerance&&Math.abs(data[i+1]-tg)<=tolerance&&Math.abs(data[i+2]-tb)<=tolerance}
  const stack=[[sx,sy]];const visited=new Uint8Array(w*h);
  let count=0,maxFill=w*h*0.4;
  while(stack.length>0&&count<maxFill){
    const[cx,cy]=stack.pop();
    if(cx<0||cx>=w||cy<0||cy>=h)continue;
    const pi=cy*w+cx;
    if(visited[pi])continue;
    const di=pi*4;
    if(!match(di))continue;
    visited[pi]=1;data[di]=fr;data[di+1]=fg;data[di+2]=fb;data[di+3]=255;count++;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1])
  }
  ctx.putImageData(imgData,0,0)
}

const DOT_SHAPES=[
  {name:'Star',pts(cx,cy,s){const p=[];for(let i=0;i<10;i++){const a=Math.PI*2*i/10-Math.PI/2,r=i%2===0?s:s*.4;p.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r})}return p}},
  {name:'Heart',pts(cx,cy,s){const p=[];for(let i=0;i<16;i++){const t=Math.PI*2*i/16,xx=16*Math.pow(Math.sin(t),3),yy=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));p.push({x:cx+xx*s/18,y:cy+yy*s/18})}return p}},
  {name:'Butterfly',pts(cx,cy,s){const p=[];for(let i=0;i<20;i++){const t=Math.PI*2*i/20,r=Math.exp(Math.sin(t))-2*Math.cos(4*t)+Math.pow(Math.sin((2*t-Math.PI)/24),5);p.push({x:cx+Math.cos(t)*r*s*.28,y:cy-Math.sin(t)*r*s*.28})}return p}},
  {name:'Flower',pts(cx,cy,s){const p=[];for(let i=0;i<15;i++){const a=Math.PI*2*i/15,r=s*(.5+.5*Math.cos(5*a));p.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r})}return p}},
  {name:'House',pts(cx,cy,s){return[{x:cx,y:cy-s},{x:cx+s*.8,y:cy-s*.3},{x:cx+s*.8,y:cy+s*.7},{x:cx+s*.25,y:cy+s*.7},{x:cx+s*.25,y:cy+s*.2},{x:cx-s*.25,y:cy+s*.2},{x:cx-s*.25,y:cy+s*.7},{x:cx-s*.8,y:cy+s*.7},{x:cx-s*.8,y:cy-s*.3}]}},
  {name:'Diamond',pts(cx,cy,s){return[{x:cx,y:cy-s},{x:cx+s*.6,y:cy-s*.3},{x:cx+s*.8,y:cy+s*.2},{x:cx+s*.4,y:cy+s*.8},{x:cx,y:cy+s},{x:cx-s*.4,y:cy+s*.8},{x:cx-s*.8,y:cy+s*.2},{x:cx-s*.6,y:cy-s*.3}]}},
  {name:'Moon',pts(cx,cy,s){const p=[];for(let i=0;i<14;i++){const a=Math.PI*.3+Math.PI*1.4*i/13;p.push({x:cx+Math.cos(a)*s,y:cy+Math.sin(a)*s})}for(let i=3;i>=0;i--){const a=Math.PI*.5+Math.PI*i/3;p.push({x:cx+s*.4+Math.cos(a)*s*.6,y:cy+Math.sin(a)*s*.6})}return p}},
  {name:'Cat',pts(cx,cy,s){return[{x:cx-s*.5,y:cy-s*.9},{x:cx-s*.3,y:cy-s*.3},{x:cx-s*.7,y:cy-s*.1},{x:cx-s*.7,y:cy+s*.5},{x:cx-s*.4,y:cy+s*.9},{x:cx-s*.1,y:cy+s*.6},{x:cx+s*.1,y:cy+s*.6},{x:cx+s*.4,y:cy+s*.9},{x:cx+s*.7,y:cy+s*.5},{x:cx+s*.7,y:cy-s*.1},{x:cx+s*.3,y:cy-s*.3},{x:cx+s*.5,y:cy-s*.9},{x:cx,y:cy-s*.4}]}},
];
let dSt={points:[],connected:[],nextIdx:0,shapeIdx:0};
function initDots(){const c=document.getElementById('dotsCanvas'),x=c.getContext('2d');c.width=c.parentElement.clientWidth;c.height=c.parentElement.clientHeight;
  function gen(){const cx=c.width/2,cy=c.height/2-20,s=Math.min(c.width,c.height)*.28,shape=DOT_SHAPES[dSt.shapeIdx%DOT_SHAPES.length];dSt.points=shape.pts(cx,cy,s);dSt.connected=[];dSt.nextIdx=0;document.getElementById('dotsHint').textContent=`connect the dots — ${shape.name}`;draw()}
  function draw(){x.clearRect(0,0,c.width,c.height);if(dSt.connected.length>1){x.beginPath();x.moveTo(dSt.connected[0].x,dSt.connected[0].y);for(let i=1;i<dSt.connected.length;i++)x.lineTo(dSt.connected[i].x,dSt.connected[i].y);x.strokeStyle='rgba(161,140,209,0.7)';x.lineWidth=3;x.lineCap='round';x.stroke()}
    if(dSt.connected.length===dSt.points.length&&dSt.points.length>0){x.beginPath();x.moveTo(dSt.connected[0].x,dSt.connected[0].y);for(let i=1;i<dSt.connected.length;i++)x.lineTo(dSt.connected[i].x,dSt.connected[i].y);x.closePath();x.fillStyle='rgba(161,140,209,0.08)';x.fill();x.strokeStyle='rgba(67,233,123,0.8)';x.lineWidth=3;x.stroke()}
    dSt.points.forEach((p,i)=>{const isN=i===dSt.nextIdx,isD=i<dSt.nextIdx;x.beginPath();x.arc(p.x,p.y,isN?12:8,0,Math.PI*2);x.fillStyle=isD?'rgba(67,233,123,0.8)':isN?'rgba(250,112,154,0.9)':'rgba(255,255,255,0.25)';x.fill();if(isN){x.strokeStyle='rgba(250,112,154,0.4)';x.lineWidth=4;x.beginPath();x.arc(p.x,p.y,18,0,Math.PI*2);x.stroke()}x.fillStyle=isD||isN?'#fff':'rgba(255,255,255,0.6)';x.font=`${isN?'600':'400'} ${isN?14:11}px Fredoka`;x.textAlign='center';x.textBaseline='middle';x.fillText(i+1,p.x,p.y)})}
  function hitDot(mx,my){if(dSt.nextIdx>=dSt.points.length)return;const tgt=dSt.points[dSt.nextIdx];if(Math.hypot(tgt.x-mx,tgt.y-my)<30){dSt.connected.push({x:tgt.x,y:tgt.y});dSt.nextIdx++;if(dSt.nextIdx>=dSt.points.length)document.getElementById('dotsHint').textContent='✅ complete! tap New Shape';draw()}}
  c.onclick=e=>{const rect=c.getBoundingClientRect();hitDot(e.clientX-rect.left,e.clientY-rect.top)};
  c.ontouchstart=e=>{e.preventDefault();const rect=c.getBoundingClientRect();const t=e.touches[0];hitDot(t.clientX-rect.left,t.clientY-rect.top)};
  document.getElementById('dotsNew').onclick=()=>{dSt.shapeIdx++;gen()};document.getElementById('dotsClear').onclick=()=>{dSt.connected=[];dSt.nextIdx=0;draw()};gen()}

// PUZZLE (image-based)
// ═══════════════════════════════════════
let pzSt={cols:3,rows:3,pieces:[],moves:0,startTime:0,timerInt:null,sceneIdx:0,imgEl:null,showPreview:false};
function initPuzzle(){
  const overlay=document.getElementById('puzzleOverlay'),complete=document.getElementById('puzzleComplete');
  overlay.style.display='flex';complete.classList.remove('show');document.getElementById('puzzleBar').style.display='none';
  clearInterval(pzSt.timerInt);
  const grid=document.getElementById('puzzleSceneGrid');grid.innerHTML='';
  IMG_DATA.forEach((im,i)=>{const card=document.createElement('div');card.className='scene-card'+(i===pzSt.sceneIdx?' active':'');
    card.innerHTML=`<img src="${im.thumb||im.src}"><div class="scene-label">${im.name}</div>`;
    card.onclick=()=>{pzSt.sceneIdx=i;grid.querySelectorAll('.scene-card').forEach(z=>z.classList.remove('active'));card.classList.add('active')};grid.appendChild(card)});
  document.querySelectorAll('.diff-btn[data-diff]').forEach(btn=>{btn.onclick=()=>{pzSt.cols=+btn.dataset.cols;pzSt.rows=+btn.dataset.rows;overlay.style.display='none';document.getElementById('puzzleBar').style.display='flex';startPuzzle()}});
}
function startPuzzle(){
  const c=document.getElementById('puzzleCanvas'),x=c.getContext('2d');
  c.width=c.parentElement.clientWidth;c.height=c.parentElement.clientHeight;
  pzSt.showPreview=false;
  const im=new Image();im.onload=()=>{
    pzSt.imgEl=im;
    const cols=pzSt.cols,rows=pzSt.rows,pw=~~(c.width/cols),ph=~~(c.height/rows);
    pzSt.moves=0;pzSt.startTime=Date.now();document.getElementById('puzzleMoves').textContent='Moves: 0';
    clearInterval(pzSt.timerInt);
    pzSt.timerInt=setInterval(()=>{if(currentMode!=='puzzle')return;const s=~~((Date.now()-pzSt.startTime)/1000);document.getElementById('puzzleTimer').textContent=`${~~(s/60)}:${String(s%60).padStart(2,'0')}`},1000);
    let pieces=[];
    for(let r=0;r<rows;r++)for(let col=0;col<cols;col++){pieces.push({id:r*cols+col,cx:col*pw,cy:r*ph,x:0,y:0,w:pw,h:ph,col,row:r})}
    // Shuffle
    const pos=pieces.map(p=>({x:p.cx,y:p.cy}));for(let i=pos.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[pos[i],pos[j]]=[pos[j],pos[i]]}
    pieces.forEach((p,i)=>{p.x=pos[i].x;p.y=pos[i].y});pzSt.pieces=pieces;

    function drawPuzzle(){
      x.fillStyle='#0f0c29';x.fillRect(0,0,c.width,c.height);
      if(pzSt.showPreview){x.globalAlpha=.5;x.drawImage(im,0,0,c.width,c.height);x.globalAlpha=1}
      // Grid
      x.strokeStyle='rgba(255,255,255,0.05)';x.lineWidth=1;
      for(let i=1;i<cols;i++){x.beginPath();x.moveTo(i*pw,0);x.lineTo(i*pw,c.height);x.stroke()}
      for(let i=1;i<rows;i++){x.beginPath();x.moveTo(0,i*ph);x.lineTo(c.width,i*ph);x.stroke()}
      pzSt.pieces.forEach(p=>{
        // Source coords in image space
        const sx=p.cx/c.width*im.width,sy=p.cy/c.height*im.height,sw=p.w/c.width*im.width,sh=p.h/c.height*im.height;
        x.drawImage(im,sx,sy,sw,sh,p.x,p.y,p.w,p.h);
        const ok=Math.abs(p.x-p.cx)<3&&Math.abs(p.y-p.cy)<3;
        x.strokeStyle=ok?'rgba(67,233,123,0.5)':'rgba(255,255,255,0.2)';x.lineWidth=ok?2:1;
        x.strokeRect(p.x+.5,p.y+.5,p.w-1,p.h-1)})
    }
    drawPuzzle();

    let dragging=null,offX=0,offY=0,prevX=0,prevY=0;
    function gp(e){const r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
    function startD(e){const pos=gp(e);for(let i=pzSt.pieces.length-1;i>=0;i--){const p=pzSt.pieces[i];if(pos.x>=p.x&&pos.x<=p.x+p.w&&pos.y>=p.y&&pos.y<=p.y+p.h){dragging=p;offX=pos.x-p.x;offY=pos.y-p.y;prevX=p.x;prevY=p.y;pzSt.pieces.splice(i,1);pzSt.pieces.push(dragging);break}}}
    function moveD(e){if(!dragging)return;const pos=gp(e);dragging.x=pos.x-offX;dragging.y=pos.y-offY;drawPuzzle()}
    function endD(){if(!dragging)return;
      const pw2=pzSt.pieces[0].w,ph2=pzSt.pieces[0].h;
      const snapD=Math.min(pw2,ph2)*.35;
      // Try snap to correct
      if(Math.abs(dragging.x-dragging.cx)<snapD&&Math.abs(dragging.y-dragging.cy)<snapD){dragging.x=dragging.cx;dragging.y=dragging.cy}
      else{
        // Snap to nearest grid cell
        const tc=Math.round(dragging.x/pw2),tr=Math.round(dragging.y/ph2);
        const tx=Math.max(0,Math.min((cols-1)*pw2,tc*pw2)),ty=Math.max(0,Math.min((rows-1)*ph2,tr*ph2));
        const other=pzSt.pieces.find(p=>p!==dragging&&Math.abs(p.x-tx)<3&&Math.abs(p.y-ty)<3);
        if(other){other.x=prevX;other.y=prevY}
        dragging.x=tx;dragging.y=ty
      }
      pzSt.moves++;document.getElementById('puzzleMoves').textContent='Moves: '+pzSt.moves;
      dragging=null;drawPuzzle();
      // Check complete
      if(pzSt.pieces.every(p=>Math.abs(p.x-p.cx)<3&&Math.abs(p.y-p.cy)<3)){
        clearInterval(pzSt.timerInt);const s=~~((Date.now()-pzSt.startTime)/1000);
        document.getElementById('puzzleStats').textContent=`${pzSt.moves} moves · ${~~(s/60)}:${String(s%60).padStart(2,'0')}`;
        document.getElementById('puzzleComplete').classList.add('show')}
    }
    c.onmousedown=startD;c.onmousemove=moveD;c.onmouseup=c.onmouseleave=endD;
    c.ontouchstart=e=>{e.preventDefault();startD(e)};c.ontouchmove=e=>{e.preventDefault();moveD(e)};c.ontouchend=endD;
    document.getElementById('puzzleReset').onclick=()=>{clearInterval(pzSt.timerInt);initPuzzle()};
    document.getElementById('puzzleAgain').onclick=()=>{clearInterval(pzSt.timerInt);initPuzzle()};
    document.getElementById('puzzlePreview').onclick=()=>{pzSt.showPreview=!pzSt.showPreview;drawPuzzle()};
  };im.src=IMG_DATA[pzSt.sceneIdx].src;
}

// BREATHE
// ═══════════════════════════════════════
let bInt=null;
function initBreathe(){clearInterval(bInt);const phases=[{dur:4,label:'Breathe In',colors:['#43E97B','#38F9D7'],scale:1.4,td:'4s'},{dur:7,label:'Hold',colors:['#A18CD1','#FBC2EB'],scale:1.4,td:'0.5s'},{dur:8,label:'Breathe Out',colors:['#FA709A','#FEE140'],scale:.8,td:'8s'}];
  let idx=0,t=4,cy=0;const orb=document.getElementById('breatheOrb'),te=document.getElementById('breatheTimer'),pe=document.getElementById('breathePhase'),ce=document.getElementById('breatheCycle'),pn=document.getElementById('breathe-panel');
  function apply(){const p=phases[idx];orb.style.background=`linear-gradient(135deg,${p.colors[0]},${p.colors[1]})`;orb.style.boxShadow=`0 0 60px ${p.colors[0]}44,0 0 120px ${p.colors[0]}22`;orb.style.transform=`scale(${p.scale})`;orb.style.transitionDuration=`${p.td},1s,1s`;pn.style.background=`radial-gradient(ellipse at center,${p.colors[0]}15,transparent 70%)`;pe.textContent=p.label;te.textContent=t;ce.textContent=`4-7-8 breathing · cycle ${cy+1}`}apply();
  bInt=setInterval(()=>{if(currentMode!=='breathe')return;t--;if(t<0){idx=(idx+1)%3;t=phases[idx].dur;if(idx===0)cy++}apply()},1000)}

// SMASH
// ═══════════════════════════════════════
let smInt=null,smSc=0;
function initSmash(){clearInterval(smInt);const panel=document.getElementById('smash-panel');panel.querySelectorAll('.smash-item').forEach(el=>el.remove());
  const emojis=['🍽️','📱','💻','⏰','📺','🏺','🎸','🪟','💡','🧊'];
  function spawn(){if(currentMode!=='smash')return;const el=document.createElement('div');el.className='smash-item';el.textContent=emojis[~~(Math.random()*emojis.length)];const s=.8+Math.random()*.6,rot=Math.random()*40-20;
    el.style.left=(10+Math.random()*80)+'%';el.style.top=(10+Math.random()*75)+'%';el.style.fontSize=(s*52)+'px';el.style.transform=`rotate(${rot}deg) scale(${s})`;
    el.onclick=()=>{if(el.classList.contains('popped'))return;el.classList.add('popped');el.style.transform=`rotate(${rot+180}deg) scale(1.8)`;smSc++;document.getElementById('smashScore').textContent='💥 '+smSc;setTimeout(()=>el.remove(),600)};
    panel.appendChild(el);setTimeout(()=>{if(el.parentNode)el.remove()},12000)}
  for(let i=0;i<6;i++)spawn();smInt=setInterval(spawn,1200)}

window.addEventListener('resize',()=>{({bubbles:initBubbles,sand:initSand,paint:initPaint,color:initColor,dots:initDots})[currentMode]?.()});
initBubbles();

// iOS Audio Unlock
(function(){
function unlock(){
if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=isMuted?0:volume;masterGain.connect(audioCtx.destination)}
if(audioCtx.state==='suspended'){audioCtx.resume()}
try{var b=audioCtx.createBuffer(1,1,22050),s=audioCtx.createBufferSource();s.buffer=b;s.connect(audioCtx.destination);s.start(0)}catch(e){}
document.removeEventListener('touchstart',unlock,true);
document.removeEventListener('touchend',unlock,true);
document.removeEventListener('click',unlock,true);
}
document.addEventListener('touchstart',unlock,true);
document.addEventListener('touchend',unlock,true);
document.addEventListener('click',unlock,true);
})();
